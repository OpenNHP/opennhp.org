<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Language preference: redirect to the user's stored choice, or on first
     visit detect from navigator.languages. Runs inline before render so the
     flash of the wrong language is minimized. Silent on storage failures. -->
<script>
(function () {
  var SUPPORTED = ['en', 'zh-cn', 'zh-tw', 'ja', 'de', 'fr', 'es'];
  var KEY = 'opennhp_lang';
  function currentLang() {
    var m = location.pathname.match(/^\/(en|zh-cn|zh-tw|ja|de|fr|es)(\/|$)/);
    return m ? m[1] : 'en';
  }
  function matchLang(tag) {
    if (!tag) return null;
    var lower = tag.toLowerCase();
    if (SUPPORTED.indexOf(lower) !== -1) return lower;
    var primary = lower.split('-')[0];
    if (primary === 'zh') {
      return /-(tw|hk|mo|hant)\b/.test(lower) ? 'zh-tw' : 'zh-cn';
    }
    return SUPPORTED.indexOf(primary) !== -1 ? primary : null;
  }
  function detectLang() {
    var list = navigator.languages || [navigator.language || ''];
    for (var i = 0; i < list.length; i++) {
      var m = matchLang(list[i]);
      if (m) return m;
    }
    return null;
  }
  function urlFor(lang) {
    var stripped = location.pathname.replace(/^\/(en|zh-cn|zh-tw|ja|de|fr|es)(\/|$)/, '/');
    var path = lang === 'en' ? stripped : '/' + lang + stripped;
    return path + location.search + location.hash;
  }
  try {
    var current = currentLang();
    var stored = null;
    try { stored = localStorage.getItem(KEY); } catch (e) {}
    if (stored && SUPPORTED.indexOf(stored) !== -1) {
      if (stored !== current) location.replace(urlFor(stored));
      return;
    }
    var detected = detectLang();
    if (detected && detected !== current) {
      try { localStorage.setItem(KEY, detected); } catch (e) {}
      location.replace(urlFor(detected));
    }
  } catch (e) { /* fail-safe: render as-is */ }
})();
</script>

<meta name="description" content="{{ .Params.description | default .Site.Title }}">

{{ with .Params.keywords }}
<meta name="keywords" content="{{ if reflect.IsSlice . }}{{ delimit . ", " }}{{ else }}{{ . | safeHTMLAttr }}{{ end }}">
{{ end }}

{{ with .Params.author }}
<meta name="author" content="{{ . }}">
{{ end }}

{{ if .Params.og }}
<!-- Open Graph -->
<meta property="og:title" content="{{ .Params.og.title | default .Title }}">
<meta property="og:description" content="{{ .Params.og.description | default .Params.description }}">
{{ with .Params.og.image }}<meta property="og:image" content="{{ . }}">{{ end }}
<meta property="og:type" content="{{ .Params.og.type | default "website" }}">
{{ with .Params.og.url }}<meta property="og:url" content="{{ . }}">{{ end }}
{{ end }}

<title>{{ .Title }}</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">

<!-- Styles -->
<link rel="stylesheet" href="/css/styles.css">

<!-- Favicon -->
<link rel="icon" href="/assets/icons/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/icons/favicon-16x16.png">
<link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png">
